services:
  postgres:
    image: postgres:16-alpine
    container_name: saju-postgres
    environment:
      POSTGRES_DB: saju
      POSTGRES_USER: saju
      POSTGRES_PASSWORD: saju
    ports:
      - "5432:5432"
    volumes:
      - saju_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saju -d saju"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  saju_postgres_data:
